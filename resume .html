<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>蘇芷嫻 - 個人履歷</title>

<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: 'Segoe UI', 'Noto Sans TC', sans-serif;
  background: linear-gradient(to bottom, #eaf6ff, #ffffff);
  color: #333;
}

/* Header */
.header {
  text-align: center;
  padding: 70px 20px 90px;
  background: linear-gradient(135deg, #a6d8ff, #66b3ff);
  color: white;
}

.header img {
  width: 150px;
  height: 150px;
  border-radius: 50%;
  border: 6px solid white;
  object-fit: cover;
  margin-bottom: 15px;
}

.header h1 {
  font-size: 30px;
  letter-spacing: 5px;
}

.header p {
  font-size: 14px;
  margin-top: 6px;
}

/* 卡片區 */
.container {
  max-width: 900px;
  margin: -60px auto 40px;
  padding: 20px;
}

/* 卡片 */
.card {
  background: white;
  border-radius: 20px;
  padding: 25px 30px;
  margin-bottom: 25px;
  box-shadow: 0 10px 25px rgba(0,0,0,0.08);
  transition: 0.3s;
  opacity: 0;
  transform: translateY(30px);
}

.card.show {
  opacity: 1;
  transform: translateY(0);
}

.card:hover {
  transform: translateY(-5px);
  box-shadow: 0 15px 35px rgba(0,0,0,0.12);
}

.title {
  font-size: 18px;
  color: #66b3ff;
  margin-bottom: 12px;
  font-weight: bold;
}

/* 技能 */
.skills {
  display: flex;
  flex-wrap: wrap;
  gap: 10px;
}

.skills span {
  background: #e6f4ff;
  color: #3399ff;
  padding: 6px 14px;
  border-radius: 20px;
  font-size: 13px;
}

/* 按鈕 */
button {
  background: #66b3ff;
  border: none;
  padding: 10px 18px;
  color: white;
  border-radius: 8px;
  cursor: pointer;
  margin-right: 10px;
}

button:hover {
  background: #3399ff;
}

#message {
  margin-top: 10px;
  color: #3399ff;
  font-weight: bold;
}
</style>
</head>

<body>

<audio id="bgm" loop>
  <source src="music.mp3" type="audio/mpeg">
</audio>

<!-- Header -->
<div class="header">
  <img src="images/photo.jpg" alt="個人照片">
  <h1>蘇 芷 嫻</h1>
  <p>亞洲大學 室內設計系</p>
  <p>學號：114055035 ｜ Email：zhixiansu5@gmail.com</p>
</div>

<!-- 卡片內容 -->
<div class="container">

  <div class="card">
    <div class="title">自我介紹</div>
    <p>
      我是一名對室內設計與視覺美感充滿熱情的學生，擅長從生活中觀察細節，
      並將創意轉化為實際設計。同時也積極探索美甲與投資等領域，
      培養多元思維與設計敏銳度。
    </p>
  </div>

  <div class="card">
    <div class="title">學歷</div>
    <p>亞洲大學 室內設計系（2025 - 現在）</p>
  </div>

  <div class="card">
    <div class="title">作品展示</div>
    <p>美甲作品集、前端小專案、設計模型</p>
  </div>

  <div class="card">
    <div class="title">技能</div>
    <div class="skills">
      <span>HTML</span>
      <span>CSS</span>
      <span>JavaScript</span>
      <span>GitHub</span>
      <span>設計軟體</span>
    </div>
  </div>

  <div class="card">
    <div class="title">經歷</div>
    <p>美甲練習（自學）、股票投資學習</p>
  </div>

  <div class="card">
    <div class="title">互動</div>
    <button onclick="showMessage()">點我</button>
    <button onclick="toggleMusic()">音樂開關</button>
    <p id="message"></p>
  </div>

</div>

<script>
const audio = document.getElementById("bgm");

// 點擊播放音樂
document.addEventListener("click", () => {
  audio.play().catch(() => {});
}, { once: true });

function toggleMusic() {
  if (audio.paused) audio.play();
  else audio.pause();
}

function showMessage() {
  document.getElementById("message").textContent =
  "✨ 你的履歷已經進化成設計師等級！";
}

// 滑入動畫
const cards = document.querySelectorAll('.card');

window.addEventListener('scroll', () => {
  const trigger = window.innerHeight * 0.85;

  cards.forEach(card => {
    const top = card.getBoundingClientRect().top;

    if (top < trigger) {
      card.classList.add('show');
    }
  });
});
</script>

</body>
</html>
